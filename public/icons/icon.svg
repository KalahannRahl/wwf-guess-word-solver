  <rect x="418" y="150" width="72" height="72" rx="12" fill="#2d5a27" stroke="#4a9a40" stroke-width="2"/>
  <text x="454" y="200" font-family="Arial Black" font-size="30" font-weight="900" fill="#00e676" text-anchor="middle">S</text>
