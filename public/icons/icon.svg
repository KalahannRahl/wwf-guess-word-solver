  <text x="232" y="163" font-family="Arial" font-size="13" fill="#00e676">TL</text>

  <!-- Tile 3 - blank -->
  <rect x="254" y="150" width="72" height="72" rx="12" fill="#1a1a3a" stroke="#2a2a5a" stroke-width="2"/>

  <!-- Tile 4 - blank -->
  <rect x="336" y="150" width="72" height="72" rx="12" fill="#1a1a3a" stroke="#2a2a5a" stroke-width="2"/>

